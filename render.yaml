services:
  - type: web
    name: healthcare-newsletter-web
    env: docker
    plan: starter
    autoDeploy: true
    buildCommand: ""
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: REDIS_URL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: MJML_APP_ID
        sync: false
      - key: MJML_SECRET_KEY
        sync: false

  - type: worker
    name: newsletter-worker
    env: docker
    plan: starter
    autoDeploy: true
    buildCommand: ""
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: REDIS_URL
        sync: false

